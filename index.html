<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Kata Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>

    <div class="arcade-machine">
        <div class="arcade-screen">
            <div class="game-console" id="gameConsole">
                <div class="particle-container" id="particleContainer"></div>

                <header class="game-header">
                    <h1 class="game-title">
                        <span class="title-pixel">TEBAK</span>
                        <span class="title-pixel accent">KATA</span>
                    </h1>
                </header>

                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">STREAK</span>
                        <span class="stat-value" id="winStreak">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">MENANG</span>
                        <span class="stat-value win" id="totalWins">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">KALAH</span>
                        <span class="stat-value lose" id="totalLosses">0</span>
                    </div>
                </div>

                <div class="hint-display" id="hintDisplay">
                    <span class="hint-icon">💡</span>
                    <span class="hint-text" id="hintText"></span>
                </div>

                <div class="game-board" id="gameBoard"></div>
                <div class="message-area" id="messageArea"></div>
            </div>
        </div>

        <!-- Panel kontrol -->
        <div class="arcade-controls">
            <div class="control-panel">
                <!-- Joystick -->
                <div class="joystick">
                    <div class="stick-base"></div>
                    <div class="stick-shaft"></div>
                    <div class="stick-ball"></div>
                </div>

                <!-- Keyboard virtual -->
                <div class="virtual-keyboard" id="virtualKeyboard">
                    <div class="keyboard-row">
                        <button class="key-btn" data-key="q">Q</button>
                        <button class="key-btn" data-key="w">W</button>
                        <button class="key-btn" data-key="e">E</button>
                        <button class="key-btn" data-key="r">R</button>
                        <button class="key-btn" data-key="t">T</button>
                        <button class="key-btn" data-key="y">Y</button>
                        <button class="key-btn" data-key="u">U</button>
                        <button class="key-btn" data-key="i">I</button>
                        <button class="key-btn" data-key="o">O</button>
                        <button class="key-btn" data-key="p">P</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="key-btn" data-key="a">A</button>
                        <button class="key-btn" data-key="s">S</button>
                        <button class="key-btn" data-key="d">D</button>
                        <button class="key-btn" data-key="f">F</button>
                        <button class="key-btn" data-key="g">G</button>
                        <button class="key-btn" data-key="h">H</button>
                        <button class="key-btn" data-key="j">J</button>
                        <button class="key-btn" data-key="k">K</button>
                        <button class="key-btn" data-key="l">L</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="key-btn wide backspace-btn" data-key="backspace">⌫</button>
                        <button class="key-btn" data-key="z">Z</button>
                        <button class="key-btn" data-key="x">X</button>
                        <button class="key-btn" data-key="c">C</button>
                        <button class="key-btn" data-key="v">V</button>
                        <button class="key-btn" data-key="b">B</button>
                        <button class="key-btn" data-key="n">N</button>
                        <button class="key-btn" data-key="m">M</button>
                        <button class="key-btn wide enter-btn" data-key="enter">ENTER</button>
                    </div>
                </div>

                <!-- Tombol aksi tambahan -->
                <div class="action-buttons">
                    <button id="hintBtn" class="arcade-btn btn-hint" title="Petunjuk (1x)">
                        <span>💡<span class="hint-count" id="hintCount">1</span></span>
                    </button>
                    <button id="restartBtn" class="arcade-btn btn-restart" title="Restart">
                        <span>↻</span>
                    </button>
                </div>

                <!-- Nyawa -->
                <div class="chances-display">
                    <span class="chances-label">NYAWA</span>
                    <span class="chances-dots" id="chancesDots"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup" id="popup">
            <div class="popup-icon" id="popupIcon"></div>
            <h2 class="popup-title" id="popupTitle"></h2>
            <p class="popup-message" id="popupMessage"></p>
            <p class="popup-answer" id="popupAnswer"></p>
            <button id="popupBtn" class="btn btn-popup">Main Lagi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
