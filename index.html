<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TEBAK KATA CHALLENGE</title>
  <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
  <link href="[https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap](https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap)" rel="stylesheet" />
  <!-- Memanggil file CSS eksternal -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bg-layer">
    <div class="scanlines"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="floating-lights">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="arcade-cabinet">
    <div id="cabinet-top">
      <div class="marquee-light-strip left"></div>
      <div id="marquee">
        <span class="marquee-title">TEBAK KATA</span>
        <span class="marquee-sub">CHALLENGE</span>
        <div class="marquee-deco">
          <span class="coin-icon">⬡</span>
          <span class="star-icon">✦</span>
          <span class="coin-icon">⬡</span>
        </div>
      </div>
      <div class="marquee-light-strip right"></div>
    </div>

    <div id="cabinet-screen-bezel">
      <div class="bezel-corner tl"></div>
      <div class="bezel-corner tr"></div>
      <div class="bezel-corner bl"></div>
      <div class="bezel-corner br"></div>
      <div class="screen-reflection"></div>

      <div id="screen">
        <div id="hud-top">
          <div id="stats-panel">
            <div class="stat-item"><span class="stat-label">WIN</span><span class="stat-val" id="stat-win">0</span></div>
            <div class="stat-item"><span class="stat-label">LOSE</span><span class="stat-val" id="stat-lose">0</span></div>
            <div class="stat-item streak"><span class="stat-label">STREAK</span><span class="stat-val" id="stat-streak">0</span></div>
            <div class="stat-item"><span class="stat-label">BEST</span><span class="stat-val" id="stat-best">0</span></div>
          </div>
          <div id="sound-btn" title="Toggle Sound"><span id="sound-icon">♪</span></div>
        </div>

        <div id="lifebar-container">
          <span class="lifebar-label">LIFE</span>
          <div id="lifebar">
            <div id="lifebar-fill"></div>
            <div id="lifebar-segments"><span></span><span></span><span></span><span></span><span></span><span></span></div>
          </div>
          <span id="lives-text">6</span>
        </div>

        <div id="game-grid-wrapper">
          <div id="game-grid"></div>
        </div>

        <div id="action-buttons">
          <button id="hint-btn" class="action-btn hint-btn"><span class="btn-icon">💡</span><span class="btn-text">HINT</span></button>
          <button id="enter-btn" class="action-btn enter-btn"><span class="btn-icon">▶</span><span class="btn-text">ENTER</span></button>
          <button id="reset-btn" class="action-btn reset-btn"><span class="btn-icon">↺</span><span class="btn-text">RESET</span></button>
        </div>

        <div id="keyboard">
          <div class="kb-row" id="kb-row-1"></div>
          <div class="kb-row" id="kb-row-2"></div>
          <div class="kb-row" id="kb-row-3">
            <button class="kb-key special-key" id="kb-backspace">⌫</button>
            <div id="kb-row-3-letters"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="cabinet-bottom">
      <div class="bottom-panel">
        <div class="coin-slot"><div class="slot-hole"></div><span>INSERT COIN</span></div>
        <div class="speaker-grille"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="coin-slot"><div class="slot-hole"></div><span>INSERT COIN</span></div>
      </div>
    </div>

    <div id="cabinet-legs">
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>
  </div>

  <div id="win-popup" class="popup hidden">
    <div class="popup-inner win-inner">
      <div class="popup-pixels"></div>
      <div class="popup-title">YOU WIN!</div>
      <div class="popup-word" id="win-word-display"></div>
      <div class="popup-sub">KATA BENAR DITEMUKAN!</div>
      <div class="popup-streak" id="win-streak-display"></div>
      <button class="popup-btn" id="win-next-btn">▶ LANJUT</button>
    </div>
  </div>

  <div id="lose-popup" class="popup hidden">
    <div class="popup-inner lose-inner">
      <div class="popup-glitch-lines"></div>
      <div class="popup-title glitch-text" data-text="GAME OVER">GAME OVER</div>
      <div class="popup-sub">KATA YANG BENAR:</div>
      <div class="popup-word lose-word" id="lose-word-display"></div>
      <button class="popup-btn lose-btn" id="lose-retry-btn">↺ COBA LAGI</button>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <!-- Memanggil file JavaScript eksternal -->
  <script src="script.js"></script>
</body>
</html>
